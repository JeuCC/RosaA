
<style>
* { margin:0; padding:0; box-sizing:border-box; }

.wrap {
  background: #080f1a;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  padding: 70px 0 90px;
  position: relative;
  overflow: hidden;
}

.stars { position:absolute; inset:0; pointer-events:none; }
.star {
  position:absolute; background:white; border-radius:50%;
  animation: twinkle var(--d,3s) var(--delay,0s) ease-in-out infinite; opacity:0;
}
@keyframes twinkle {
  0%,100%{ opacity:0; transform:scale(1); }
  50%    { opacity:var(--op,.7); transform:scale(1.4); }
}

/* ── ESCENA ── */
.scene {
   display: flex;
  align-items: flex-end;
  gap: 32px;
  position: relative;
  z-index: 1;

  transform: scale(1);
  transform-origin: center bottom;
}

/* 📱 Celulares */
@media (max-width: 600px) {
  .scene {
    transform: scale(0.7);
  }
}

/* 📲 Tablets */
@media (max-width: 900px) {
  .scene {
    transform: scale(0.85);
  }
}

/* 🖥️ Pantallas grandes */
@media (min-width: 1400px) {
  .scene {
    transform: scale(1.2);
  }
}

/* TEXTO */
.mensaje {
  margin-top: 40px;
  font-size: 24px;
  color: #fff;
  text-align: center;
  font-family: 'Georgia', serif;
  letter-spacing: 1px;
  text-shadow: 0 0 10px rgba(255,255,255,0.6),
               0 0 20px rgba(213,45,88,0.5);
  animation: fadeIn 2s ease forwards;
}

@keyframes fadeIn {
  from { opacity:0; transform:translateY(20px); }
  to   { opacity:1; transform:translateY(0); }
}


/* ══════════════ ROSA ══════════════ */
.container { position:relative; }

.glass {
  height:350px; width:200px;
  background: linear-gradient(135deg, rgba(30,60,100,0.55) 0%, rgba(10,25,55,0.80) 60%, rgba(18,33,57,0.90) 100%);
  border-radius:300px 300px 0 0;
  border:1.5px solid rgba(120,160,220,0.25);
  position:relative;
}
.glass:before {
  content:""; height:10px; width:10px; transform-origin:center;
  border:10px solid rgba(18,33,57,0.95); border-radius:100%;
  position:absolute; left:87px; top:-25px;
  box-shadow:0 0 12px rgba(100,150,220,0.4);
}
.glass:after {
  content:""; position:absolute;
  height:15px; width:250px;
  background:linear-gradient(90deg,#7a1e1e,#a52a2a,#7a1e1e);
  top:100%; left:-13%;
  border-radius:0 0 4px 4px;
  box-shadow:0 4px 18px rgba(165,42,42,0.6);
}
.glass-rim {
  position:absolute; top:0; left:0; right:0; height:100%;
  border-radius:300px 300px 0 0;
  border:1px solid rgba(160,200,255,0.12); pointer-events:none;
}
.shine {
  width:12px; height:140px;
  background:linear-gradient(180deg,rgba(255,255,255,0.55),rgba(255,255,255,0.05));
  opacity:0.25; position:absolute; left:85%; top:80px;
  border-radius:100px; z-index:10;
}
.shine:before {
  content:""; width:12px; height:20px; position:absolute;
  background:rgba(255,255,255,0.3); top:160px; border-radius:100px;
}
.shine:after {
  content:""; width:5px; height:60px; position:absolute;
  background:rgba(255,255,255,0.15); top:0; left:-10px; border-radius:100px;
}
.halo {
  position:absolute; width:160px; height:160px; border-radius:50%;
  background:radial-gradient(circle,rgba(213,45,88,0.38) 0%,rgba(213,45,88,0.10) 55%,transparent 75%);
  top:30px; left:20px;
  animation:haloPulse 2.8s ease-in-out infinite;
  pointer-events:none; z-index:0;
}
@keyframes haloPulse {
  0%,100%{ opacity:.7; transform:scale(1); }
  50%    { opacity:1;  transform:scale(1.14); }
}
.particles { position:absolute; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:20; }
.particle {
  position:absolute; border-radius:50%;
  animation:floatUp var(--dur,4s) var(--del,0s) ease-in-out infinite; opacity:0;
}
@keyframes floatUp {
  0%  { opacity:0;  transform:translateY(0) scale(1) rotate(0deg); }
  20% { opacity:.9; }
  80% { opacity:.5; }
  100%{ opacity:0;  transform:translateY(-120px) scale(0.3) rotate(180deg); }
}

.petals > div {
  position:absolute; background:#d52d58; width:45px; height:80px; top:55px; transition:all .5s ease-out;
}
.petals > div:nth-child(1){ border-radius:15px; box-shadow:0 0 30px #f594b8; left:80px; top:60px; background:#d52d58; }
.petals > div:nth-child(2),.petals > div:nth-child(4),.petals > div:nth-child(6){ background:#b81b43; left:60px; border-radius:0 30px 0 30px; transform-origin:bottom right; }
.petals > div:nth-child(3),.petals > div:nth-child(5),.petals > div:nth-child(7){ background:#b81b43; left:100px; border-radius:30px 0 30px 0; transform-origin:bottom left; }
.petals > div:nth-child(2){ z-index:5; background:#ab1a3f; top:75px; height:70px; box-shadow:0 0 50px rgba(245,148,184,.5); animation:bloom2 3s ease-in-out forwards; }
.petals > div:nth-child(3){ z-index:4; background:#ab1a3f; top:75px; height:70px; box-shadow:0 0 50px rgba(245,148,184,.5); animation:bloom3 3s ease-in-out forwards, glowing 2.5s ease-in-out infinite; }
.petals > div:nth-child(4){ z-index:3; background:#b81b43; top:70px; height:75px; box-shadow:0 0 50px rgba(245,148,184,.5); animation:bloom4 3s ease-in-out forwards, glowing 2.5s ease-in-out infinite; }
.petals > div:nth-child(5){ z-index:2; background:#b81b43; top:70px; height:75px; box-shadow:0 0 50px rgba(245,148,184,.5); animation:bloom5 3s ease-in-out forwards, glowing 2.5s ease-in-out infinite; }
.petals > div:nth-child(6){ z-index:1; background:#c9204b; top:65px; height:70px; box-shadow:0 0 50px rgba(245,148,184,.3); animation:bloom6 3s ease-in-out forwards, glowing 2.5s ease-in-out infinite; }
.petals > div:nth-child(7){ z-index:0; background:#c9204b; top:65px; height:70px; box-shadow:0 0 50px rgba(245,148,184,.3); animation:bloom7 3s ease-in-out forwards, glowing 2.5s ease-in-out infinite; }

.deadPetals > div { position:absolute; background:#d52d58; width:20px; height:15px; top:120px; border-radius:0 30px 0 30px; box-shadow:0 0 30px rgba(245,148,184,.5); }
.deadPetals > div:nth-child(1){ left:67px;  animation:falling 20s 4s  ease-in-out infinite; }
.deadPetals > div:nth-child(2){ left:104px; animation:falling 20s 8s  ease-in-out infinite; }
.deadPetals > div:nth-child(3){ left:91px;  animation:falling 20s 12s ease-in-out infinite; }
.deadPetals > div:nth-child(4){ left:69px;  animation:falling 20s 16s ease-in-out infinite; }

.leaves > div:nth-last-child(1){ position:absolute; width:55px; height:30px; background:#338f37; top:120px; left:75px; border-radius:100px; }
.leaves > div:nth-child(1){ position:absolute; width:6px; height:210px; background:#054c05; top:95px; left:100px; border-radius:0 0 100px 100px; }
.leaves > div:nth-child(2){ position:absolute; width:30px; height:50px; border-radius:5px 40px 20px 40px; background:#054c05; transform-origin:bottom; transform:rotate(-30deg); top:180px; left:80px; box-shadow:inset 5px 5px #066406; }
.leaves > div:nth-child(3){ position:absolute; width:30px; height:50px; border-radius:40px 5px 40px 20px; background:#054c05; transform-origin:bottom; transform:rotate(30deg); top:150px; left:95px; box-shadow:inset -5px 5px #066406; }

.thorns > div { position:absolute; width:0; height:0; }
.thorns > div:nth-child(odd) { border-top:5px solid transparent; border-bottom:5px solid transparent; border-left:5px solid #054c05; left:105px; }
.thorns > div:nth-child(even){ border-top:5px solid transparent; border-bottom:5px solid transparent; border-right:5px solid #054c05; left:95px; }
.thorns > div:nth-child(1){ top:200px; }
.thorns > div:nth-child(2){ top:170px; }
.thorns > div:nth-child(4){ top:230px; }

.shadow-rose {
  position:absolute; width:220px; height:18px;
  background:radial-gradient(ellipse,rgba(0,0,0,0.55) 0%,transparent 75%);
  bottom:-18px; left:-10px; border-radius:50%;
}

/* ══════════════ LIBRO ══════════════ */
.book-wrap {
  position: relative;
  animation: bookFloat 4s 1s ease-in-out infinite;
  transform-origin: bottom center;
}
@keyframes bookFloat {
  0%,100%{ transform: rotate(0deg) translateY(0); }
  35%    { transform: rotate(1.5deg) translateY(-4px); }
  70%    { transform: rotate(-1.5deg) translateY(-2px); }
}

.book {
  position: relative;
  width: 130px;
  height: 170px;
  animation: bookAppear .8s .4s ease-out both;
}
@keyframes bookAppear {
  from{ opacity:0; transform:translateY(20px) rotate(-5deg); }
  to  { opacity:1; transform:translateY(0) rotate(0deg); }
}

/* Tapa trasera */
.book-back {
  position:absolute; bottom:0; left:6px;
  width:122px; height:168px;
  background: linear-gradient(160deg,#1a0a2e,#0d0618);
  border-radius:3px 8px 8px 3px;
  border:1px solid rgba(120,60,180,0.3);
}

/* Lomo */
.book-spine {
  position:absolute; bottom:0; left:0;
  width:14px; height:170px;
  background: linear-gradient(180deg,#2a0a4a,#1a0535,#2a0a4a);
  border-radius:3px 0 0 3px;
  border:1px solid rgba(150,80,220,0.4);
  box-shadow: inset -2px 0 6px rgba(0,0,0,0.5), 0 0 14px rgba(150,80,220,0.25);
  z-index:3;
}
/* líneas decorativas en el lomo */
.book-spine:before {
  content:'';
  position:absolute; top:22px; left:2px;
  width:10px; height:1px;
  background:rgba(200,150,255,0.4);
  box-shadow: 0 8px 0 rgba(200,150,255,0.3), 0 116px 0 rgba(200,150,255,0.3), 0 124px 0 rgba(200,150,255,0.4);
}

/* Tapa delantera */
.book-cover {
  position:absolute; bottom:0; left:6px;
  width:122px; height:170px;
  background: linear-gradient(145deg,#1e0a38,#130525 50%,#1a0830);
  border-radius:3px 8px 8px 3px;
  border:1px solid rgba(160,90,230,0.35);
  box-shadow:
    0 0 30px rgba(160,80,220,0.2),
    inset 0 0 30px rgba(100,30,160,0.15);
  overflow:hidden;
  z-index:2;
}

/* Marco dorado en la tapa */
.book-frame {
  position:absolute; inset:8px;
  border:1px solid rgba(200,160,80,0.35);
  border-radius:3px;
}
.book-frame:before {
  content:'';
  position:absolute; inset:4px;
  border:1px solid rgba(200,160,80,0.2);
  border-radius:2px;
}

/* Rosa en la tapa del libro */
.book-rose-icon {
  position:absolute; top:50%; left:50%;
  transform:translate(-50%,-54%);
  width:50px; height:50px;
}
.book-rose-icon svg { width:100%; height:100%; }

/* Líneas de texto decorativas */
.book-lines {
  position:absolute; bottom:22px; left:14px; right:14px;
}
.book-line {
  height:2px; border-radius:1px; margin-bottom:5px;
  background:rgba(200,160,80,0.25);
  animation: lineGlow 3s ease-in-out infinite;
}
.book-line:nth-child(1){ width:70%; animation-delay:.2s; }
.book-line:nth-child(2){ width:55%; animation-delay:.5s; }
.book-line:nth-child(3){ width:65%; animation-delay:.8s; }
@keyframes lineGlow {
  50%{ background:rgba(200,160,80,0.5); box-shadow:0 0 6px rgba(200,160,80,0.3); }
}

/* Brillo tapa */
.book-shine {
  position:absolute; top:10px; right:14px;
  width:5px; height:80px;
  background:linear-gradient(180deg,rgba(255,255,255,0.12),transparent);
  border-radius:3px;
}

/* Páginas (canto) */
.book-pages {
  position:absolute; bottom:4px; right:-6px;
  width:10px; height:162px;
  background: repeating-linear-gradient(
    180deg,
    #e8dcc8 0px, #e8dcc8 1px,
    #d4c8b0 1px, #d4c8b0 2px
  );
  border-radius:0 2px 2px 0;
  opacity:0.6;
  z-index:1;
}

/* Partículas del libro */
.book-particles { position:absolute; top:0; left:0; width:100%; height:100%; pointer-events:none; }
.book-particle {
  position:absolute; border-radius:50%;
  animation:bookSparkle var(--bd,3s) var(--bde,0s) ease-in-out infinite; opacity:0;
}
@keyframes bookSparkle {
  0%  { opacity:0;  transform:translate(0,0) scale(1); }
  30% { opacity:.8; }
  100%{ opacity:0;  transform:translate(var(--bx,5px),var(--by,-30px)) scale(0.2); }
}

/* Base del libro */
.book-base {
  width:140px; height:12px;
  background:linear-gradient(90deg,#7a1e1e,#a52a2a,#7a1e1e);
  border-radius:0 0 4px 4px;
  box-shadow:0 4px 14px rgba(165,42,42,0.5);
  margin-top:0;
}
.book-shadow {
  width:140px; height:14px;
  background:radial-gradient(ellipse,rgba(0,0,0,0.5) 0%,transparent 75%);
  border-radius:50%;
  margin-top:4px;
}

/* Halo del libro */
.book-halo {
  position:absolute; top:-20px; left:-10px;
  width:150px; height:150px; border-radius:50%;
  background:radial-gradient(circle,rgba(140,60,220,0.18) 0%,transparent 70%);
  animation:bookHalo 3.5s ease-in-out infinite;
  pointer-events:none;
}
@keyframes bookHalo {
  0%,100%{ opacity:.6; transform:scale(1); }
  50%    { opacity:1;  transform:scale(1.1); }
}

/* ══════════════ ANIMACIONES ROSA ══════════════ */
@keyframes bloom2 {
  50% { transform:rotate(-90deg); top:200px; left:100px; }
  100%{ transform:rotate(-60deg); top:252px; left:50px; background:#71122a; box-shadow:0 0 0 rgba(245,148,184,0); }
}
@keyframes bloom3{ 100%{ transform:rotate(45deg); } }
@keyframes bloom4{ 100%{ transform:rotate(-20deg); } }
@keyframes bloom5{ 100%{ transform:rotate(20deg); } }
@keyframes bloom6{ 100%{ transform:rotate(-5deg); } }
@keyframes bloom7{ 100%{ transform:rotate(5deg); } }
@keyframes glowing{ 50%{ background:#d7365f; box-shadow:0 0 60px #f594b8; } }
@keyframes falling {
  0%  { top:120px; opacity:1; transform:rotate(-30deg); }
  15% { transform:rotate(-60deg) translateX(-8px); }
  25% { transform:rotate(10deg) translateX(5px); }
  35% { top:330px; background:#9d193b; box-shadow:0 0 0 rgba(245,148,184,0); transform:rotate(-20deg); }
  45% { top:335px; opacity:.4; }
  100%{ top:335px; opacity:0; }
}
</style>

<div class="wrap" id="wrap">
  <div class="stars" id="stars"></div>

  <!-- CORREGIDO AQUÍ -->
  <div class="scene">

    <!-- ── ROSA ── -->
    <div class="container">
      <div class="shadow-rose"></div>
      <div class="glass">
        <div class="shine"></div>
        <div class="glass-rim"></div>
        <div class="halo"></div>
        <div class="particles" id="particles"></div>
      </div>
      <div class="thorns"><div></div><div></div><div></div><div></div></div>
      <div class="leaves"><div></div><div></div><div></div><div></div></div>
      <div class="petals"><div></div><div></div><div></div><div></div><div></div><div></div><div></div></div>
      <div class="deadPetals"><div></div><div></div><div></div><div></div></div>
    </div>

    <!-- ── LIBRO ── -->
    <div class="book-wrap">
      <div class="book-halo"></div>
      <div class="book">
        <div class="book-back"></div>
        <div class="book-pages"></div>
        <div class="book-spine"></div>
        <div class="book-cover">
          <div class="book-frame"></div>

          <div class="book-rose-icon">
            <svg viewBox="0 0 50 50">
              <ellipse cx="25" cy="32" rx="12" ry="7" fill="#7a1030"/>
              <ellipse cx="15" cy="26" rx="9" ry="7" fill="#8a1535"/>
              <ellipse cx="35" cy="26" rx="9" ry="7" fill="#8a1535"/>
              <ellipse cx="25" cy="14" rx="10" ry="7" fill="#aa1f40"/>
            </svg>
          </div>

          <div class="book-lines">
            <div class="book-line"></div>
            <div class="book-line"></div>
            <div class="book-line"></div>
          </div>

          <div class="book-shine"></div>
        </div>

        <div class="book-particles" id="bookParticles"></div>
      </div>

      <div class="book-base"></div>
      <div class="book-shadow"></div>
    </div>

  </div>

  <!-- TEXTO (FUERA de .scene para que quede abajo centrado) -->
  <div class="mensaje">
    Feliz día del Libro. Aremy
  </div>

</div>

<script>
  /* Estrellas */
  const starsEl = document.getElementById('stars');
  for(let i=0;i<80;i++){
    const s=document.createElement('div');
    s.className='star';
    const size=Math.random()*2.5+1;
    s.style.cssText=`width:${size}px;height:${size}px;left:${Math.random()*100}%;top:${Math.random()*100}%;--d:${(Math.random()*3+2).toFixed(1)}s;--delay:${(Math.random()*5).toFixed(1)}s;--op:${(Math.random()*.6+.2).toFixed(2)};`;
    starsEl.appendChild(s);
  }

  /* Partículas rosa */
  const pEl=document.getElementById('particles');
  const colors=['#ffd700','#ffb347','#ff9eb5','#ffe4e1','#fff0a0'];
  for(let i=0;i<18;i++){
    const p=document.createElement('div');
    p.className='particle';
    const size=Math.random()*4+2;
    p.style.cssText=`width:${size}px;height:${size}px;left:${Math.random()*80+10}%;top:${Math.random()*60+30}%;background:${colors[Math.floor(Math.random()*colors.length)]};--dur:${(Math.random()*3+3).toFixed(1)}s;--del:${(Math.random()*5).toFixed(1)}s;box-shadow:0 0 ${size*2}px ${colors[Math.floor(Math.random()*colors.length)]};`;
    pEl.appendChild(p);
  }

  /* Partículas libro */
  const bpEl=document.getElementById('bookParticles');
  const bookColors=['#c896ff','#e0b0ff','#ffd700','#b060ff','#ffe4ff'];
  for(let i=0;i<12;i++){
    const p=document.createElement('div');
    p.className='book-particle';
    const size=Math.random()*3+1.5;
    const bx=(Math.random()*30-15).toFixed(0);
    const by=-(Math.random()*40+15).toFixed(0);
    p.style.cssText=`width:${size}px;height:${size}px;left:${Math.random()*80+10}%;top:${Math.random()*70+15}%;background:${bookColors[Math.floor(Math.random()*bookColors.length)]};--bd:${(Math.random()*3+2.5).toFixed(1)}s;--bde:${(Math.random()*4).toFixed(1)}s;--bx:${bx}px;--by:${by}px;box-shadow:0 0 ${size*2}px ${bookColors[Math.floor(Math.random()*bookColors.length)]};`;
    bpEl.appendChild(p);
  }
</script>
